<header>

<section class='hero'>
<div class='hero-text'>
<h1>高中生肌肉与体态健康管理平台</h1>
<p>健康生活，迎接美好生活，支持AI姿态识别、BMI计算、健康数据分析与互动打卡。</p>

<button class="btn" onclick="openModal('loginModal')">登录</button>

<div id="loginModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal('loginModal')">&times;</span>
<h2>账号登录</h2>
<input type="text" placeholder="账号">
<input type="password" placeholder="密码">
<button onclick="closeModal('loginModal')">登录</button>
<p>
<a href="#" onclick="switchModal('loginModal','registerModal')">注册账号</a> |
<a href="#" onclick="switchModal('loginModal','thirdModal')">第三方登录</a>
</p>
</div>
</div>

<div id="registerModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal('registerModal')">&times;</span>
<h2>用户注册</h2>
<input type="text" placeholder="用户名">
<input type="email" placeholder="邮箱">
<input type="password" placeholder="密码">
<button>注册</button>
</div>
</div>

<div id="thirdModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal('thirdModal')">&times;</span>
<h2>第三方登录</h2>
<button>微信登录</button>
<button>QQ登录</button>
<button>Google登录</button>
</div>
</div>

</div>
<img src='images/banner1.png'>
</section>

<section class='slider-section'>
<div class='slider'>
<img class='slide active' src='images/banner1.png'>
<img class='slide' src='images/banner2.png'>
<img class='slide' src='images/banner3.png'>
<img class='slide' src='images/banner4.png'>
</div>
</section>
<section class='grid'>
<div class='card'>
<h2>BMI计算</h2>
<input id='height' placeholder='输入身高cm'>
<input id='weight' placeholder='输入体重kg'>
<button onclick='bmiCalc()'>计算</button>
<p id='bmi'></p>
</div>
<div class='card'>
<h2>健康数据</h2>
<div id='chart' style='height:250px'></div>
</div>
<div class='card'>
<img src='images/banner2.png'>
<h2>AI姿态分析</h2>
<p>通过摄像头识别坐姿与肩颈状态。</p>
</div>
</section>
<footer>顶部导航 + 底部导航 + 响应式交互设计</footer>
